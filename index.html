<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>missinte piller... ennum 🌸</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+Malayalam:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ───── TOKENS ───── */
    :root {
      --bloom-blush:   #fff0f5;
      --bloom-rose:    #ffd6e7;
      --bloom-petal:   #ffb3cc;
      --bloom-deep:    #e8688a;
      --bloom-crimson: #c04b6e;
      --bloom-mist:    rgba(255, 240, 245, 0.85);
      --white:         #ffffff;
      --ink:           #3a1f2a;
      --ink-soft:      #7a4f60;
      --ink-ghost:     #b08898;
      --shadow-card:   0 8px 48px rgba(192, 75, 110, 0.12),
                       0 2px 12px rgba(192, 75, 110, 0.08),
                       0 0 0 1px rgba(255, 179, 204, 0.2);
      --shadow-hover:  0 16px 64px rgba(192, 75, 110, 0.2),
                       0 4px 20px rgba(192, 75, 110, 0.12);
      --radius-card:   24px;
      --transition:    cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ───── RESET ───── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow-x: hidden;
      font-family: 'Crimson Pro', Georgia, serif;
      background: linear-gradient(160deg, var(--bloom-blush) 0%, var(--white) 60%, #fff5f8 100%);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ───── PETAL BACKGROUND DECORATION ───── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(255, 214, 231, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 75%, rgba(255, 179, 204, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(255, 240, 245, 0.5) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    /* ───── FLOATING PETALS ───── */
    .petal {
      position: fixed;
      width: 10px; height: 14px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      animation: petalFall linear infinite;
    }
    .petal:nth-child(1)  { left:  8%; background: rgba(255,179,204,0.6); width: 8px;  height:11px; animation-duration:14s; animation-delay: 0s;   }
    .petal:nth-child(2)  { left: 22%; background: rgba(255,214,231,0.5); width:12px;  height:16px; animation-duration:18s; animation-delay:-4s;  }
    .petal:nth-child(3)  { left: 37%; background: rgba(255,200,220,0.55); width: 9px; height:13px; animation-duration:12s; animation-delay:-9s;  }
    .petal:nth-child(4)  { left: 55%; background: rgba(255,179,204,0.45); width:11px;  height:15px; animation-duration:16s; animation-delay:-2s;  }
    .petal:nth-child(5)  { left: 68%; background: rgba(255,214,231,0.6); width: 7px;  height:10px; animation-duration:20s; animation-delay:-7s;  }
    .petal:nth-child(6)  { left: 80%; background: rgba(255,179,204,0.5); width:10px;  height:14px; animation-duration:15s; animation-delay:-12s; }
    .petal:nth-child(7)  { left: 92%; background: rgba(255,200,220,0.4); width:13px;  height:18px; animation-duration:22s; animation-delay:-5s;  }

    @keyframes petalFall {
      0%   { transform: translateY(-30px) rotate(0deg) translateX(0);   opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(105vh) rotate(360deg) translateX(40px); opacity: 0; }
    }

    /* ───── APP CONTAINER ───── */
    #app-container {
      position: relative;
      min-height: 100dvh;
      z-index: 2;
    }

    /* ───────────────────────────────────────
       SPLASH SCREEN
    ─────────────────────────────────────── */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #ffe4ef 0%, #fff0f7 40%, #fde8f0 100%);
      transition: opacity 0.9s var(--transition), visibility 0.9s var(--transition);
    }

    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Decorative ring behind text */
    #splash-screen::before {
      content: '';
      position: absolute;
      width: min(400px, 80vw);
      height: min(400px, 80vw);
      border-radius: 50%;
      border: 1px solid rgba(255, 155, 180, 0.2);
      box-shadow:
        0 0 0 20px rgba(255,179,204,0.07),
        0 0 0 50px rgba(255,214,231,0.05),
        inset 0 0 60px rgba(255,214,231,0.15);
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);   opacity: 0.8; }
      50%       { transform: scale(1.04); opacity: 1;   }
    }

    /* Tiny blossom dots */
    #splash-screen::after {
      content: '✿ ❀ ✿';
      position: absolute;
      bottom: calc(50% - 110px);
      font-size: 13px;
      letter-spacing: 12px;
      color: rgba(192, 75, 110, 0.3);
      animation: fadeInUp 1.4s 1s both;
    }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeInUp 1.1s 0.2s both;
      position: relative;
      z-index: 1;
    }

    .malayalam-handwriting {
      font-family: 'Sacramento', cursive;
      font-size: clamp(2.4rem, 9vw, 5rem);
      color: var(--bloom-crimson);
      line-height: 1.3;
      text-align: center;
      padding: 0 24px;
      letter-spacing: 0.01em;
      text-shadow:
        0 2px 20px rgba(192,75,110,0.2),
        0 0 60px rgba(255,179,204,0.4);
    }

    .splash-sub {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.85rem, 3vw, 1.1rem);
      color: var(--ink-ghost);
      letter-spacing: 0.15em;
      text-transform: lowercase;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ───────────────────────────────────────
       MAIN CONTENT
    ─────────────────────────────────────── */
    #main-content {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(16px, 5vw, 48px) clamp(12px, 4vw, 32px) 48px;
      gap: 0;
    }

    #main-content.hidden { display: none; }

    /* ───────────────────────────────────────
       SITE HEADER
    ─────────────────────────────────────── */
    .site-header {
      text-align: center;
      margin-bottom: clamp(24px, 5vw, 40px);
      animation: fadeInUp 0.8s 0.1s both;
    }

    .site-header .eyebrow {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.25em;
      color: var(--bloom-deep);
      text-transform: lowercase;
      margin-bottom: 8px;
    }

    .site-header h1 {
      font-family: 'Sacramento', cursive;
      font-size: clamp(2rem, 7vw, 3.8rem);
      color: var(--bloom-crimson);
      line-height: 1.15;
      text-shadow: 0 2px 16px rgba(192,75,110,0.15);
    }

    .site-header .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-top: 12px;
    }

    .site-header .divider::before,
    .site-header .divider::after {
      content: '';
      height: 1px;
      width: clamp(40px, 12vw, 80px);
      background: linear-gradient(to right, transparent, var(--bloom-petal));
    }
    .site-header .divider::after {
      background: linear-gradient(to left, transparent, var(--bloom-petal));
    }

    .site-header .divider span {
      font-size: 16px;
      color: var(--bloom-deep);
      opacity: 0.6;
    }

    /* ───────────────────────────────────────
       MEMORY CARD
    ─────────────────────────────────────── */
    .memory-card {
      background: var(--white);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 680px;
      overflow: hidden;
      transition: box-shadow 0.4s var(--transition), transform 0.4s var(--transition);
      animation: cardReveal 0.9s 0.3s both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(32px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .memory-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

        /* ── Card heading strip (NEW) ── */
    .card-heading-strip {
      padding: 20px 20px 6px;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      border-bottom: 1px solid rgba(255,179,204,.12);
    }
    .card-heading-strip .relive-label {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(.6rem,2vw,.7rem);
      font-weight: 300; letter-spacing: .3em;
      text-transform: uppercase; color: var(--ink-ghost);
    }
    .card-heading-strip h2 {
      font-family: 'Sacramento', cursive;
      font-size: clamp(1.8rem,6vw,2.6rem);
      color: var(--bloom-crimson); line-height: 1.15;
      text-shadow: 0 1px 12px rgba(192,75,110,.12);
    }
    .strip-rule {
      width: 52px; height: 1.5px;
      background: linear-gradient(to right,transparent,var(--bloom-petal),transparent);
      margin-top: 2px;
    }

    /* ───────────────────────────────────────
       TAG PILLS (category filter)
    ─────────────────────────────────────── */
    .tag-filter-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tag-filter-bar::-webkit-scrollbar { display: none; }

    .tag-pill {
      flex-shrink: 0;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--bloom-petal);
      color: var(--bloom-crimson);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .tag-pill:hover { transform: scale(1.04); background: var(--bloom-rose); }
    .tag-pill.active {
      background: var(--bloom-crimson);
      color: white;
      border-color: var(--bloom-crimson);
    }

    /* ───────────────────────────────────────
       CLOUDINARY GALLERY MOUNT
    ─────────────────────────────────────── */
    #cloudinary-gallery-container {
      width: 100%;
      min-height: 320px;
      background: linear-gradient(135deg, var(--bloom-blush), #fff8fb);
      position: relative;
    }

    /* Cloudinary widget internal frame */
    #cloudinary-gallery-container > * {
      border-radius: 0 !important;
    }

    /* ───────────────────────────────────────
       CAPTION DISPLAY BOX
    ─────────────────────────────────────── */
    #caption-display-box {
      padding: clamp(20px, 4vw, 32px) clamp(20px, 5vw, 36px);
      border-top: 1px solid rgba(255, 179, 204, 0.2);
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, rgba(255,240,245,0.3), transparent);
      position: relative;
    }

    #caption-display-box::before {
      content: '"';
      position: absolute;
      top: 10px; left: 20px;
      font-family: 'Sacramento', cursive;
      font-size: 4rem;
      color: var(--bloom-petal);
      line-height: 1;
      pointer-events: none;
    }

    #memory-caption-text {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(1rem, 3.2vw, 1.2rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.65;
      color: var(--ink-soft);
      text-align: center;
      max-width: 520px;
      transition: opacity 0.45s var(--transition), transform 0.45s var(--transition);
      padding: 0 16px;
    }

    #memory-caption-text.fading {
      opacity: 0;
      transform: translateY(8px);
    }

    /* ───────────────────────────────────────
       CARD FOOTER
    ─────────────────────────────────────── */
    .card-footer {
      padding: 14px 24px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-top: 1px solid rgba(255,179,204,0.15);
    }

    .card-footer span {
      font-family: 'Crimson Pro', serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--ink-ghost);
      text-transform: lowercase;
    }

    .card-footer .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--bloom-petal);
    }

    /* ───────────────────────────────────────
       RESPONSIVE
    ─────────────────────────────────────── */
    @media (max-width: 480px) {
      .memory-card { border-radius: 18px; }
      #caption-display-box { padding: 18px 20px; min-height: 80px; }
      #caption-display-box::before { font-size: 3rem; }
    }

    /* ───────────────────────────────────────
       UTILITY
    ─────────────────────────────────────── */
    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Ambient petals -->
  <div class="petal" aria-hidden="true"></div>
  <div class="petal" aria-hidden="true"></div>
  <div class="petal" aria-hidden="true"></div>
  <div class="petal" aria-hidden="true"></div>
  <div class="petal" aria-hidden="true"></div>
  <div class="petal" aria-hidden="true"></div>
  <div class="petal" aria-hidden="true"></div>

  <div id="app-container">

    <!-- ① SPLASH SCREEN PORTAL -->
    <div id="splash-screen" role="status" aria-label="Loading memory capsule">
      <div class="splash-inner">
        <h1 class="malayalam-handwriting">missinte piller...<br>ennum</h1>
        <p class="splash-sub">a memory capsule ✿</p>
      </div>
    </div>

    <!-- ② MAIN CORE MEMORY CAPSULE -->
    <main id="main-content" class="hidden">

      <!-- Site Header -->
      <header class="site-header">
        <p class="eyebrow">a little gift from your students</p>
        <h1>Lekshmi Miss</h1>
        <div class="divider"><span>✿</span></div>
      </header>

      <!-- Central Floating Narrative Card -->
      <div class="memory-card">

        <!-- Heading strip -->
        <div class="card-heading-strip">
          <span class="relive-label">scroll through</span>
          <h2>Relive the Memories</h2>
          <div class="strip-rule"></div>
        </div>
        
        <!-- Tag Filter Bar -->
        <nav class="tag-filter-bar" aria-label="Memory categories">
          <button class="tag-pill active" data-tag="all">all memories</button>
          <button class="tag-pill" data-tag="christmas">christmas</button>
          <button class="tag-pill" data-tag="exhibition">exhibition</button>
          <button class="tag-pill" data-tag="sahrdaya">sahrdaya</button>
          <button class="tag-pill" data-tag="vimala">vimala</button>
          <button class="tag-pill" data-tag="tour">tour</button>
          
          
        </nav>

        <!-- Cloudinary Widget Mount Point -->
        <div id="cloudinary-gallery-container"></div>

        <!-- Dynamic Caption Target -->
        <div id="caption-display-box" aria-live="polite">
          <p id="memory-caption-text">Loading a sweet memory...</p>
        </div>

        <!-- Card Footer -->
        <footer class="card-footer">
          <span>made with love</span>
          <div class="dot"></div>
          <span>class of 2025</span>
          <div class="dot"></div>
          <span>always yours</span>
        </footer>
      </div>

    </main>

  </div><!-- /#app-container -->

  <!-- Cloudinary Product Gallery Widget -->
  <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>

  <script>
    /* ═══════════════════════════════════════════════════
       CONFIGURATION
    ═══════════════════════════════════════════════════ */
    const CLOUDINARY_CONFIG = {
      cloudName: "dka5mpokp",
      activeTags: ["christmas", "egg", "exhibition", "tour", "sahrdaya", "vimala"]
    };

    const MEMORY_CAPTIONS_MAP = {
      "vimala": [
        "Deeply psychological experience!",
        "Physics Expo sent electricity through you",
        "I hope nobody fell for the Ghost Selfie cam prank"
      ],
      "sahrdaya": [
        "Nammal thookki! prizes ellam thookki!",
        "Was just happy to be here.",
        "They had really cute pet Rabbits"
      ],
      "tour": [
        '"Josephe... 9thum 11thum ore bussil aahn, venel vanno..."',
        "I need one more statement",
        "Highly inexpensive tour!!"
      ],
      "christmas": [
        "Exotic Coconut-leaf Christmas tree",
        "Highly uneventful Christmas Celebration",
        "We won that one, fair and Square. Feji can't beat us down."
      ],
      "exhibition": [
        "ONE-DAY WONDER!",
        "Telephone booth stood up on hopes and dreams..",
        "Abhinav's Spotify premium carried the prep work"
      ],
      "all": [
        "Every photo here is a piece of our heart, Miss...",
        "Thank you for every laugh, every lesson, every memory.",
        '"Nallath parayippichillenkilum, mosham parayippikkaruth"'
      ]
    };

    /* ═══════════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════════ */
    let activeTag = "all";
    let galleryWidget = null;

    /* ═══════════════════════════════════════════════════
       CAPTION ENGINE — smooth cross-fade
    ═══════════════════════════════════════════════════ */
    const captionEl = document.getElementById("memory-caption-text");

    function getRandomCaption(tag) {
      const pool = MEMORY_CAPTIONS_MAP[tag] || MEMORY_CAPTIONS_MAP["all"];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function setCaption(tag) {
      const newText = getRandomCaption(tag);
      captionEl.classList.add("fading");
      setTimeout(() => {
        captionEl.textContent = newText;
        captionEl.classList.remove("fading");
      }, 460);
    }

    /* ═══════════════════════════════════════════════════
       TAG FILTER PILLS
    ═══════════════════════════════════════════════════ */
    const pills = document.querySelectorAll(".tag-pill");

    pills.forEach(pill => {
      pill.addEventListener("click", () => {
        pills.forEach(p => p.classList.remove("active"));
        pill.classList.add("active");
        activeTag = pill.dataset.tag;
        setCaption(activeTag);
        refreshGallery(activeTag);
      });
    });

    /* ═══════════════════════════════════════════════════
       CLOUDINARY GALLERY WIDGET
    ═══════════════════════════════════════════════════ */
    function buildGalleryOptions(tag) {
      const tagsToLoad = (tag === "all")
        ? CLOUDINARY_CONFIG.activeTags
        : [tag];

      return {
        cloudName: CLOUDINARY_CONFIG.cloudName,
        // Change this line to target the direct DOM element instead of a string ID
        container: document.getElementById("cloudinary-gallery-container"),
        displayProps: { mode: "classic", columns: 3 },
        aspectRatio: "16:9",
        carouselStyle: "thumbnails",
        carouselLocation: "bottom",
        zoom: false,
        borderColor: "transparent",
        navigationArrowSize: 40,
        navigationButtonProps: {
          shape: "round",
          iconColor: "#c04b6e",
          color: "rgba(255,240,245,0.95)"
        },
        mediaAssets: tagsToLoad.map(t => ({ tag: t })),
        events: {
          assetChanged: (data) => {
            // Identify tag of current asset from its public_id or tags
            const asset = data && data.asset;
            let detectedTag = activeTag;

            if (asset && asset.tags && Array.isArray(asset.tags)) {
              const matched = CLOUDINARY_CONFIG.activeTags.find(t =>
                asset.tags.includes(t)
              );
              if (matched) detectedTag = matched;
            }

            setCaption(detectedTag);
          }
        }
      };
    }

    function initGallery(tag) {
      if (typeof cloudinary === "undefined") {
        console.warn("Cloudinary widget not loaded yet.");
        return;
      }
      
      const containerEl = document.getElementById("cloudinary-gallery-container");
      
      // Destroy existing widget cleanly
      if (galleryWidget && typeof galleryWidget.destroy === "function") {
        try { galleryWidget.destroy(); } catch(e) {}
      }
      
      // Wipe the container clean
      containerEl.innerHTML = "";

      // Initialize using the direct element options
      galleryWidget = cloudinary.galleryWidget(buildGalleryOptions(tag));
      galleryWidget.render();
    }

    function refreshGallery(tag) {
      initGallery(tag);
    }

/* ═══════════════════════════════════════════════════
       SPLASH SCREEN → MAIN REVEAL (REVISED WITH BOOT STRAP)
       ═══════════════════════════════════════════════════ */
    const splash = document.getElementById("splash-screen");
    const mainContent = document.getElementById("main-content");

    let isTimeElapsed = false;
    let isWindowLoaded = false;

    function attemptReveal() {
      // ONLY reveal if both the 2.5s timer has hit AND the scripts are fully downloaded
      if (isTimeElapsed && isWindowLoaded) {
        mainContent.classList.remove("hidden");
        
        requestAnimationFrame(() => {
          splash.classList.add("fade-out");
          splash.addEventListener("transitionend", () => {
            splash.remove();
          }, { once: true });
        });

        // Initialize gallery and first caption safely
        initGallery("all");
        setCaption("all");
      }
    }

    // 1. Kick off the minimum 2.5s splash animation timer
    setTimeout(() => {
      isTimeElapsed = true;
      attemptReveal();
    }, 2500);

    // 2. Safety Net: Wait until all network assets and external scripts are 100% ready
    window.addEventListener("load", () => {
      isWindowLoaded = true;
      attemptReveal();
    });
  </script>
</body>
</html>
